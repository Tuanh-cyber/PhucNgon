services:
  # ── Web service: FastAPI backend ─────────────────────────────────────────────
  - type: web
    name: phucngon-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── Database: Neon (external, free) ──
      # Chuỗi kết nối từ Neon, user điền trên Render dashboard
      # Format: postgresql://user:password@host/db?sslmode=require
      - key: DATABASE_URL
        sync: false

      # ── Secrets (auto-generated) ──
      - key: JWT_SECRET
        generateValue: true

      # ── Application config ──
      - key: APP_ENV
        value: "production"

      # ── CORS ──
      - key: CORS_ORIGINS
        value: "https://phucngon.app"

      # ── ASR Service (Module 2 - Vy) ──
      - key: ASR_MODE
        value: "real"

      - key: ASR_SERVICE_URL
        value: "https://anh-ngotuananh29--phucngon-asr-asrservice-web.modal.run"
