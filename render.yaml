services:
  # ── Web service: FastAPI backend ─────────────────────────────────────────────
  - type: web
    name: phucngon-api
    runtime: python
    buildCommand: |
      pip install -r requirements.txt && \
      alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # DATABASE_URL: Neon (external free Postgres)
      # ⚠️ ĐẶT BẰNG TÁCH TRÊN RENDER DASHBOARD (không commit password vào repo)
      # Format Neon: postgresql://user:pass@host/db?sslmode=require
      # Backend: tự đổi postgres:// -> postgresql+psycopg:// + xử lý SSL tự động via psycopg
      - key: DATABASE_URL

      - key: JWT_SECRET
        generateValue: true
        scope: service
        description: "JWT signing secret (32+ chars, randomly generated per deploy)"

      - key: CORS_ORIGINS
        value: "https://phucngon.app"

      - key: ASR_MODE
        value: "real"

      - key: ASR_SERVICE_URL
        value: "https://anh-ngotuananh29--phucngon-asr-asrservice-web.modal.run"

      - key: APP_ENV
        value: "production"
